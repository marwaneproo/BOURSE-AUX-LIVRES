{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="{% static 'web/images/logo-emsi.png' %}">
  <title>Inscription — Bourse aux Livres EMSI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --ink:#10231a; --muted:#68776e; --green:#168447; --green-dark:#0d5d34; --line:#dfe8e2; --soft:#f3f8f5; }
    body { min-height:100vh; padding:clamp(24px,4vw,64px); display:grid; place-items:center; font-family:Inter,system-ui,sans-serif; color:var(--ink); background:radial-gradient(circle at 12% 15%,rgba(42,169,97,.18),transparent 28%),radial-gradient(circle at 88% 85%,rgba(13,93,52,.13),transparent 32%),#edf4ef; }
    .card { width:min(1180px,100%); min-height:720px; display:grid; grid-template-columns:38% 62%; grid-template-rows:auto auto 1fr; column-gap:0; padding:0; border:1px solid rgba(13,93,52,.1); border-radius:32px; background:#fff; box-shadow:0 35px 90px rgba(27,71,47,.14); position:relative; overflow:hidden; }
    .card::before { content:""; position:absolute; inset:0 auto 0 0; width:38%; background:linear-gradient(155deg,#0b4d2d,#168447); z-index:0; }
    .card::after { content:""; position:absolute; width:360px; height:360px; left:-180px; bottom:-190px; border:1px solid rgba(255,255,255,.18); border-radius:50%; box-shadow:0 0 0 70px rgba(255,255,255,.035),0 0 0 140px rgba(255,255,255,.025); }
    .card-header { grid-column:1; grid-row:1 / span 2; align-self:center; text-align:center; color:#fff; position:relative; z-index:1; padding:clamp(42px,5vw,72px); }
    .logo-wrap { width:126px; height:126px; margin:0 auto 30px; display:grid; place-items:center; border-radius:34px; background:#fff; box-shadow:0 20px 50px rgba(0,0,0,.22); }
    .logo-wrap img { width:88px; height:88px; object-fit:contain; }
    .card-header h2 { font-size:clamp(34px,4vw,48px); line-height:1.05; letter-spacing:-.04em; margin-bottom:16px; }
    .card-header p { max-width:280px; margin:0 auto; color:rgba(255,255,255,.78); font-size:15px; line-height:1.65; }
    .badge-emsi { display:inline-flex; padding:5px 9px; margin-right:7px; border-radius:7px; color:#fff; background:rgba(255,255,255,.14); font-size:10px; font-weight:800; letter-spacing:.12em; }
    #register-form { grid-column:2; grid-row:1 / span 3; align-self:center; position:relative; z-index:1; display:grid; padding:clamp(46px,6vw,86px); grid-template-columns:1fr 1fr; gap:0 16px; }
    #register-form > .form-row { display:contents; }
    #register-form > .form-group:nth-of-type(n+2), #register-form > .btn-submit, .member-link { grid-column:1 / -1; }
    .form-group { margin-bottom:17px; }
    .form-group label { display:block; margin-bottom:7px; color:#304239; font-size:12px; font-weight:800; letter-spacing:.02em; }
    .input-wrap { position:relative; }
    .input-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); display:grid; color:#84948b; }
    .form-control { width:100%; height:52px; padding:0 16px 0 47px; border:1px solid var(--line); border-radius:13px; background:#f7faf8; outline:none; font:14px Inter,sans-serif; transition:.2s ease; }
    .form-control:focus { border-color:var(--green); background:#fff; box-shadow:0 0 0 4px rgba(22,132,71,.1); }
    .form-control.error { border-color:#dc2626; box-shadow:0 0 0 4px rgba(220,38,38,.08); }
    .strength-bar { height:4px; margin-top:7px; border-radius:99px; overflow:hidden; background:#e8eeea; }
    .strength-fill { height:100%; width:0; border-radius:inherit; transition:.25s ease; }
    .field-error { display:none; margin-top:5px; color:#dc2626; font-size:11px; }
    .btn-submit { height:54px; margin-top:5px; border:0; border-radius:14px; color:#fff; background:var(--green-dark); font:700 15px Inter,sans-serif; cursor:pointer; box-shadow:0 14px 30px rgba(13,93,52,.2); transition:.2s ease; }
    .btn-submit:hover:not(:disabled) { transform:translateY(-2px); background:var(--green); box-shadow:0 18px 34px rgba(13,93,52,.25); }
    .btn-submit:disabled { opacity:.65; cursor:not-allowed; }
    .error-box { grid-column:2; grid-row:1; align-self:start; display:none; align-items:center; gap:8px; position:relative; z-index:3; padding:12px 14px; border:1px solid #fecaca; border-radius:12px; color:#b91c1c; background:#fff3f3; font-size:12px; transform:translateY(18px); margin:0 clamp(46px,6vw,86px); }
    .member-link { margin-top:18px; text-align:center; color:var(--muted); font-size:14px; }
    .member-link a { color:var(--green-dark); font-weight:800; text-decoration:none; }
    .footer-links { grid-column:1; grid-row:3; align-self:end; position:relative; z-index:1; padding:0 28px 38px; text-align:center; }
    .footer-links a { color:#fff; font-weight:700; text-decoration:none; }
    .back-link { display:inline-flex; align-items:center; gap:6px; color:rgba(255,255,255,.88)!important; font-size:13px; font-weight:600!important; text-decoration:underline!important; text-underline-offset:4px; }
    @media(max-width:900px) { body{padding:0;background:#fff}.card{min-height:100vh;grid-template-columns:1fr;grid-template-rows:auto auto auto;padding:36px 24px;border:0;border-radius:0;box-shadow:none}.card::before{width:100%;height:290px}.card-header{grid-column:1;grid-row:1;align-self:start;padding:0 0 42px}.logo-wrap{width:88px;height:88px;margin-bottom:18px;border-radius:24px}.logo-wrap img{width:62px;height:62px}.card-header h2{font-size:30px}.card-header p{font-size:13px}#register-form{grid-column:1;grid-row:2;display:block;padding:28px 0 0}.error-box{grid-column:1;grid-row:2;transform:none;align-self:start;margin:0}.footer-links{grid-column:1;grid-row:3;margin-top:28px}.footer-links a{color:var(--green-dark)}.member-link{margin-top:16px}.back-link{color:#829087!important} }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      <div class="logo-wrap">
        <img src="{% static 'web/images/logo-emsi.png' %}" alt="Logo EMSI" />
      </div>
      <h2>Créer un compte</h2>
      <p><span class="badge-emsi">EMSI</span>Rejoignez la communauté étudiante</p>
    </div>

    <div class="error-box" id="reg-error" role="alert">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>
      </svg>
      <span id="reg-error-text"></span>
    </div>

    <form id="register-form" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="nom">Nom *</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
            </span>
            <input id="nom" name="nom" class="form-control" required placeholder="Ex: Benali" />
          </div>
        </div>
        <div class="form-group">
          <label for="prenom">Prénom *</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
            </span>
            <input id="prenom" name="prenom" class="form-control" required placeholder="Ex: Amine" />
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="username">Nom d'utilisateur *</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Zm0 0c0 1.657 1.007 3 2.25 3S21 13.657 21 12a9 9 0 1 0-2.636 6.364M16.5 12V8.25"/></svg>
          </span>
          <input id="username" name="username" class="form-control" required autocomplete="username" placeholder="Ex: amine_benali" />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email *</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/></svg>
          </span>
          <input id="email" name="email" type="email" class="form-control" required placeholder="email@emsi.ma" />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe *</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/></svg>
          </span>
          <input id="password" name="password" type="password" class="form-control" required autocomplete="new-password" placeholder="Minimum 8 caractères" oninput="checkStrength(this.value)" />
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirmer le mot de passe *</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
          </span>
          <input id="confirm_password" name="confirm_password" type="password" class="form-control" required autocomplete="new-password" placeholder="Répétez votre mot de passe" />
        </div>
        <div class="field-error" id="pwd-match-error">Les mots de passe ne correspondent pas.</div>
      </div>

      <button type="submit" class="btn-submit" id="reg-btn">Créer mon compte</button>
      <p class="member-link">Déjà membre ? <a href="/connexion/">Se connecter</a></p>
    </form>

    <div class="footer-links">
      <a href="/" class="back-link">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>
        </svg>
        Retour à l'accueil
      </a>
    </div>
  </div>

  <script src="{% static 'web/js/config.js' %}"></script>
  <script src="{% static 'web/js/api.js' %}"></script>
  <script src="{% static 'web/js/main.js' %}"></script>
  <script>

    function checkStrength(pwd) {
      const fill = document.getElementById('strength-fill');
      let score = 0;
      if (pwd.length >= 8)   score++;
      if (/[A-Z]/.test(pwd)) score++;
      if (/[0-9]/.test(pwd)) score++;
      if (/[^A-Za-z0-9]/.test(pwd)) score++;
      const pct   = [0, 25, 50, 75, 100][score];
      const color = ['', '#ef4444', '#f97316', '#eab308', '#22c55e'][score];
      fill.style.width      = pct + '%';
      fill.style.background = color;
    }

    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errorBox  = document.getElementById('reg-error');
      const errorText = document.getElementById('reg-error-text');
      const pwdMatch  = document.getElementById('pwd-match-error');
      const btn       = document.getElementById('reg-btn');

      errorBox.style.display  = 'none';
      pwdMatch.style.display  = 'none';

      const password  = this.password.value;
      const confirm   = this.confirm_password.value;

      if (password !== confirm) {
        pwdMatch.style.display = 'block';
        document.getElementById('confirm_password').classList.add('error');
        document.getElementById('confirm_password').focus();
        return;
      }
      document.getElementById('confirm_password').classList.remove('error');

      btn.disabled    = true;
      btn.textContent = 'Création…';

      const payload = {
        username    : this.username.value.trim(),
        email       : this.email.value.trim(),
        password,
        nom         : this.nom.value.trim(),
        prenom      : this.prenom.value.trim(),
        est_acheteur: true,
        est_vendeur : true,
      };

      try {
        await API.post(ENDPOINTS.REGISTER, payload);
        const data = await API.post(ENDPOINTS.LOGIN, {
          username: payload.username,
          password: payload.password,
        });
        Auth.setSession(data.access, data.refresh, data.user);
        window.location.href = '/accueil/';
      } catch (err) {
        errorText.textContent  = err.message || 'Erreur lors de la création du compte.';
        errorBox.style.display = 'flex';
        btn.disabled    = false;
        btn.textContent = 'Créer mon compte';
      }
    });
  </script>
</body>
</html>
