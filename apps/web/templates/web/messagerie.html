{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="{% static 'web/images/logo-emsi.png' %}">
  <title>Messagerie — Bourse aux Livres EMSI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #111b21;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
    }

    .app {
      display: flex;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      margin: 0;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: clamp(340px, 27vw, 440px);
      background: #fff;
      border-right: 1px solid #e9edef;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      background: #f0f2f5;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar-header .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #10840a;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 600;
      font-size: 15px;
    }

    .sidebar-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #111b21;
      flex: 1;
    }

    .sidebar-header a {
      font-size: 13px;
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .search-box {
      padding: 8px 16px;
      background: #f0f2f5;
    }

    .search-box input {
      width: 100%;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
      outline: none;
    }

    .conversations {
      flex: 1;
      overflow-y: auto;
    }

    .conversation {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid #f0f2f5;
    }

    .conversation:hover { background: #f5f6f6; }
    .conversation.active { background: #f0f2f5; }

    .conversation .avatar {
      width: 50px; height: 50px;
      border-radius: 50%;
      background: #54a260;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 600;
      font-size: 17px;
      flex-shrink: 0;
    }

    .conv-info { flex: 1; min-width: 0; }

    .conv-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .conv-name {
      font-weight: 600;
      font-size: 15.5px;
      color: #111b21;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-time {
      font-size: 12px;
      color: #667781;
      flex-shrink: 0;
    }

    .conv-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .conv-preview {
      font-size: 13.5px;
      color: #667781;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .conv-preview.unread { color: #111b21; font-weight: 500; }

    .conv-badge {
      background: #667eea;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      padding: 0 6px;
      flex-shrink: 0;
    }

    /* ===== CHAT ===== */
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #efeae2;
    }

    .chat-header {
      background: #f0f2f5;
      padding: 10px clamp(22px, 3vw, 40px);
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid #e9edef;
    }

    .chat-header .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #667eea;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 600;
      font-size: 15px;
    }

    .chat-header-info h3 {
      font-size: 16px;
      font-weight: 600;
      color: #111b21;
    }

    .chat-header-info p {
      font-size: 13px;
      color: #667781;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px clamp(28px, 5vw, 88px);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .message {
      max-width: 55%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14.2px;
      line-height: 1.4;
      position: relative;
      word-wrap: break-word;
      animation: popIn 0.2s ease;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(8px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message.sent {
      align-self: flex-end;
      background: hsl(126, 39%, 70%);
      border-top-right-radius: 0;
    }

    .message.received {
      align-self: flex-start;
      background: #fff;
      border-top-left-radius: 0;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }

    .message-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      margin-top: 2px;
    }

    .message-time { font-size: 11px; color: #667781; }
    .message-check { font-size: 13px; color: #53bdeb; }
    .message-check.pending { color: #888e92; }

    .date-separator {
      align-self: center;
      background: #e1f2fb;
      color: #54656f;
      font-size: 12.5px;
      padding: 6px 14px;
      border-radius: 8px;
      margin: 16px 0;
      font-weight: 500;
    }

    .chat-input-area {
      background: #f0f2f5;
      padding: 10px clamp(22px, 3vw, 40px);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-input-area input {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 15px;
      background: #fff;
      outline: none;
    }

    .chat-input-area button {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: none;
      background: #667eea;
      color: #fff;
      cursor: pointer;
      font-size: 20px;
      display: grid;
      place-items: center;
      transition: all 0.15s;
    }

    .chat-input-area button:hover { transform: scale(1.08); background: #5a6fd6; }
    .chat-input-area button:disabled { background: #a0aec0; cursor: not-allowed; transform: none; }

    .empty-chat {
      display: grid;
      place-items: center;
      height: 100%;
      color: #667781;
    }

    .empty-chat div { text-align: center; }
    .empty-chat .icon { font-size: 64px; margin-bottom: 16px; opacity: 0.4; }
    .empty-chat h3 { font-size: 20px; font-weight: 500; margin-bottom: 8px; }
    .empty-chat p { font-size: 14px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }

    @media (max-width: 900px) {
      .sidebar { width: 320px; }
      .messages { padding: 16px 20px; }
      .message { max-width: 75%; }
    }
  </style>
</head>
<body>
  {{ frontend_user|json_script:"django-user-data" }}
  <script>window.DJANGO_USER = JSON.parse(document.getElementById('django-user-data').textContent);</script>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="avatar" id="my-avatar">?</div>
        <h2>Messages</h2>
        <a href="/catalogue/">← Retour</a>
      </div>
      <div class="search-box">
        <input type="text" placeholder="Rechercher une conversation..." id="search-conv" />
      </div>
      <div class="conversations" id="conversations">
        <div style="padding:60px 20px; text-align:center; color:#667781;">
          <div style="font-size:32px; margin-bottom:12px;">💬</div>
          <p>Chargement...</p>
        </div>
      </div>
    </aside>

    <!-- Chat -->
    <section class="chat">
      <div class="chat-header">
        <div class="avatar" id="chat-avatar">?</div>
        <div class="chat-header-info">
          <h3 id="chat-name">Sélectionnez une conversation</h3>
          <p id="chat-status">—</p>
        </div>
      </div>

      <div class="messages" id="messages">
        <div class="empty-chat">
          <div>
            <div class="icon">💬</div>
            <h3>Vos messages</h3>
            <p>Sélectionnez une conversation pour discuter</p>
          </div>
        </div>
      </div>

      <form class="chat-input-area" id="msg-form">
        <input type="text" id="msg-input" placeholder="Écrivez un message..." autocomplete="off" disabled />
        <button type="submit" id="send-btn" disabled>➤</button>
      </form>
    </section>
  </div>

  <script src="{% static 'web/js/config.js' %}"></script>
  <script src="{% static 'web/js/api.js' %}"></script>
  <script src="{% static 'web/js/main.js' %}"></script>

  <script>
    // ─── AUTH ───
    const myUser  = Auth.getUser() || window.DJANGO_USER;
    // ✅ myId peut être dans user.id directement
    const myId    = myUser?.id;

    const myName  = [myUser?.prenom, myUser?.nom].filter(Boolean).join(' ') || myUser?.username || 'Moi';
    const myPhotoUrl = myUser?.photo_url || null;
    const myAvatarEl = document.getElementById('my-avatar');
    if (myAvatarEl) {
      if (myPhotoUrl) {
        myAvatarEl.innerHTML = `<img src="${myPhotoUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="Photo" data-self-avatar>`;
        myAvatarEl.setAttribute('data-self-avatar', '');
      } else {
        myAvatarEl.textContent = getInitials(myName);
      }
    }

    let currentUserId   = null;
    let currentUserName = null;
    let pollInterval    = null;
    let pollBusy        = false;
    let conversationsSignature = '';
    let messagesSignature = '';

    // ─── UTILS ───
    function getInitials(name) {
      if (!name) return '?';
      return name.split(/\s+/).filter(Boolean).map(n => n[0]).join('').toUpperCase().slice(0, 2) || '?';
    }

    function formatTime(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }

    function formatDateSep(iso) {
      const d = new Date(iso);
      const now = new Date();
      const diff = Math.floor((now - d) / 86400000);
      if (diff === 0) return "Aujourd'hui";
      if (diff === 1) return "Hier";
      return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    function esc(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    // ✅ Extraire l'ID depuis un champ qui peut être un nombre OU un objet
    function extractId(field) {
      if (field === null || field === undefined) return null;
      if (typeof field === 'object') return field.id;
      return field;
    }

    // ✅ Extraire le nom depuis expediteur_details ou destinataire_details
    function extractName(details) {
      if (!details) return 'Utilisateur';
      const nom = [details.prenom, details.nom].filter(Boolean).join(' ').trim();
      return nom || details.username || 'Utilisateur';
    }

    // ─── CONVERSATIONS ───
    async function loadConversations() {
      const container = document.getElementById('conversations');

      try {
        const messages = await API.get(ENDPOINTS.MESSAGES);
        const signature = JSON.stringify(messages.map(m => [m.id, m.contenu, m.date_envoi, m.est_lu]));
        if (signature === conversationsSignature) return;
        conversationsSignature = signature;


        if (!Array.isArray(messages) || messages.length === 0) {
          container.innerHTML = `
            <div style="padding:80px 20px; text-align:center; color:#667781;">
              <div style="font-size:48px; margin-bottom:16px;">📭</div>
              <p style="font-size:15px;">Aucune conversation</p>
              <p style="font-size:13px; margin-top:8px;">Contactez un vendeur depuis la <a href="/catalogue/" style="color:#667eea;">marketplace</a></p>
            </div>`;
          return;
        }

        // ✅ Regrouper par interlocuteur — extraire les IDs correctement
        const convs = {};

        messages.forEach(msg => {
          const expId  = extractId(msg.expediteur);
          const destId = extractId(msg.destinataire);
          const isMe   = expId === myId;
          const otherId = isMe ? destId : expId;
          if (!otherId) return;

          const otherDetails = isMe ? msg.destinataire_details : msg.expediteur_details;
          const otherName    = extractName(otherDetails);

          if (!convs[otherId]) {
            convs[otherId] = { id: otherId, name: otherName, lastMsg: msg.contenu, time: msg.date_envoi, unread: 0 };
          } else if (new Date(msg.date_envoi) > new Date(convs[otherId].time)) {
            convs[otherId].lastMsg = msg.contenu;
            convs[otherId].time    = msg.date_envoi;
          }

          if (!isMe && !msg.est_lu) {
            convs[otherId].unread++;
          }
        });

        const sorted = Object.values(convs).sort((a, b) => new Date(b.time) - new Date(a.time));

        if (sorted.length === 0) {
          container.innerHTML = `<div style="padding:40px; text-align:center; color:#667781;">Aucune conversation</div>`;
          return;
        }

        container.innerHTML = sorted.map(c => `
          <div class="conversation ${c.id === currentUserId ? 'active' : ''}"
               onclick="openConversation(${c.id}, '${c.name.replace(/'/g, "\\'")}')">
            <div class="avatar">${getInitials(c.name)}</div>
            <div class="conv-info">
              <div class="conv-top">
                <span class="conv-name">${esc(c.name)}</span>
                <span class="conv-time">${formatTime(c.time)}</span>
              </div>
              <div class="conv-bottom">
                <span class="conv-preview ${c.unread > 0 ? 'unread' : ''}">${esc(c.lastMsg)}</span>
                ${c.unread > 0 ? `<span class="conv-badge">${c.unread}</span>` : ''}
              </div>
            </div>
          </div>
        `).join('');

      } catch (err) {
        console.error('Erreur conversations:', err);
        container.innerHTML = `<div style="padding:40px; color:#ef4444; text-align:center;">Impossible de charger</div>`;
      }
    }

    // ─── OUVERTURE CONVERSATION ───
    async function openConversation(userId, userName) {
      currentUserId   = parseInt(userId);
      currentUserName = userName;

      document.getElementById('chat-avatar').textContent = getInitials(userName);
      document.getElementById('chat-name').textContent   = userName;
      document.getElementById('chat-status').textContent = 'en ligne';
      document.getElementById('msg-input').disabled      = false;
      document.getElementById('send-btn').disabled       = false;

      document.querySelectorAll('.conversation').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.conversation').forEach(c => {
        if (c.getAttribute('onclick')?.includes(`openConversation(${userId},`)) {
          c.classList.add('active');
        }
      });

      await loadMessages(userId);
      startPolling(userId);
    }

    // ─── AFFICHAGE MESSAGES ───
    async function loadMessages(userId) {
      try {
        const msgs = await API.get(ENDPOINTS.DISCUSSION(userId));
        const box  = document.getElementById('messages');
        const signature = userId + ':' + JSON.stringify(msgs.map(m => [m.id, m.contenu, m.date_envoi, m.est_lu]));
        if (signature === messagesSignature) return;
        messagesSignature = signature;


        if (!Array.isArray(msgs) || msgs.length === 0) {
          box.innerHTML = `
            <div class="empty-chat">
              <div>
                <div class="icon">✉️</div>
                <h3>Pas encore de messages</h3>
                <p>Envoyez le premier message</p>
              </div>
            </div>`;
          return;
        }

        // ✅ Grouper par date avec séparateurs
        let lastDate = null;
        let html = '';

        msgs.forEach(m => {
          const dateSep = formatDateSep(m.date_envoi);
          if (dateSep !== lastDate) {
            lastDate = dateSep;
            html += `<div class="date-separator">${dateSep}</div>`;
          }

          // ✅ Comparer les IDs correctement
          const expId = extractId(m.expediteur);
          const isMe  = expId === myId;

          html += `
            <div class="message ${isMe ? 'sent' : 'received'}">
              ${esc(m.contenu)}
              <div class="message-footer">
                <span class="message-time">${formatTime(m.date_envoi)}</span>
                ${isMe ? `<span class="message-check ${m.est_lu ? '' : 'pending'}">${m.est_lu ? '✓✓' : '✓'}</span>` : ''}
              </div>
            </div>`;
        });

        box.innerHTML = html;
        box.scrollTop = box.scrollHeight;

      } catch (err) {
        console.error('Erreur messages:', err);
        document.getElementById('messages').innerHTML =
          `<div style="padding:40px; color:#ef4444; text-align:center;">Erreur de chargement</div>`;
      }
    }

    // ─── POLLING ───
    function startPolling(userId) {
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(async () => {
        if (currentUserId !== parseInt(userId) || pollBusy || document.hidden) return;
        pollBusy = true;
        try {
          await Promise.all([loadMessages(userId), loadConversations()]);
        } finally {
          pollBusy = false;
        }
      }, 10000);
    }

    // ─── ENVOI ───
    document.getElementById('msg-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const input = document.getElementById('msg-input');
      const text  = input.value.trim();
      if (!text || !currentUserId) return;

      // Affichage optimiste immédiat
      const box = document.getElementById('messages');
      if (box.querySelector('.empty-chat')) box.innerHTML = '';

      box.insertAdjacentHTML('beforeend', `
        <div class="message sent">
          ${esc(text)}
          <div class="message-footer">
            <span class="message-time">${formatTime(new Date().toISOString())}</span>
            <span class="message-check pending">✓</span>
          </div>
        </div>`);
      box.scrollTop = box.scrollHeight;
      input.value = '';

      try {
        await API.post(ENDPOINTS.MESSAGES, {
          destinataire: currentUserId,
          contenu: text
        });
        // Recharger pour avoir les données vraies (lu, timestamp exact)
        await loadMessages(currentUserId);
        await loadConversations();
      } catch (err) {
        console.error('Erreur envoi:', err);
        toast('Erreur lors de l\'envoi', 'error');
      }
    });

    // ─── RECHERCHE ───
    document.getElementById('search-conv').addEventListener('input', function() {
      const term = this.value.toLowerCase().trim();
      document.querySelectorAll('.conversation').forEach(c => {
        const name = c.querySelector('.conv-name')?.textContent.toLowerCase() || '';
        c.style.display = name.includes(term) ? '' : 'none';
      });
    });

    // ─── INIT ───
    (async function init() {
      await loadConversations();

      // Ouvrir conversation depuis URL ?to=ID&name=NOM
      const params = new URLSearchParams(window.location.search);
      const toId   = params.get('to') || params.get('user_id');
      const toName = params.get('name') ? decodeURIComponent(params.get('name')) : `Utilisateur #${toId}`;

      if (toId) {
        setTimeout(() => openConversation(parseInt(toId), toName), 300);
      }
    })();

    window.addEventListener('beforeunload', () => {
      if (pollInterval) clearInterval(pollInterval);
    });
  </script>
</body>
</html>
